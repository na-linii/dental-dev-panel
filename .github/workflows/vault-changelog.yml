name: Vault Changelog

on:
  push:
    branches: [main]

concurrency:
  group: vault-changelog
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: Aleopch1k/claude-vault
          token: ${{ secrets.VAULT_REPO_PAT }}
          path: vault

      - name: Generate changelog entries
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          mkdir -p "vault/Claude/Changelog/${REPO_NAME}"

          jq -c '.commits[]' "$GITHUB_EVENT_PATH" | while read -r commit; do
            FULL_SHA=$(echo "$commit" | jq -r '.id')
            SHA=$(echo "$FULL_SHA" | cut -c1-8)
            MESSAGE=$(echo "$commit" | jq -r '.message' | head -1)
            FULL_MESSAGE=$(echo "$commit" | jq -r '.message')
            TIMESTAMP=$(echo "$commit" | jq -r '.timestamp')
            AUTHOR=$(echo "$commit" | jq -r '.author.username // .author.name')
            DATE=$(echo "$TIMESTAMP" | cut -c1-10)
            TIME=$(echo "$TIMESTAMP" | cut -c12-19)

            FILEPATH="vault/Claude/Changelog/${REPO_NAME}/${DATE}-${SHA}.md"

            if [ -f "$FILEPATH" ]; then
              echo "Skip existing: ${FILEPATH}"
              continue
            fi

            FILES=$(cd source && git diff-tree --no-commit-id --name-status -r "$FULL_SHA" 2>/dev/null | while read -r status file; do
              case "$status" in
                A) echo "- \`${file}\` (A)" ;;
                M) echo "- \`${file}\` (M)" ;;
                D) echo "- \`${file}\` (D)" ;;
                R*) echo "- \`${file}\` (R)" ;;
                *) echo "- \`${file}\` (${status})" ;;
              esac
            done)

            cat > "$FILEPATH" << ENDOFFILE
---
date: ${TIMESTAMP}
repo: ${REPO_NAME}
author: ${AUTHOR}
sha: ${SHA}
branch: main
tags: [changelog, ${REPO_NAME}, ${AUTHOR}]
---

## ${SHA} — ${MESSAGE}

**Автор:** [[${AUTHOR}]]
**Ветка:** main
**Дата:** ${DATE} ${TIME} UTC

### Сообщение коммита
${FULL_MESSAGE}

### Изменённые файлы
${FILES}
ENDOFFILE

            echo "Created: ${FILEPATH}"
          done

      - name: Push to vault
        run: |
          cd vault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Claude/Changelog/
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
          else
            REPO_NAME="${{ github.event.repository.name }}"
            git commit -m "changelog(${REPO_NAME}): $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
