name: Vault Changelog

on:
  push:
    branches: [main]

concurrency:
  group: vault-changelog
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: Aleopch1k/claude-vault
          token: ${{ secrets.VAULT_REPO_PAT }}
          path: vault

      - name: Debug event payload
        run: |
          echo "=== Commit count ==="
          jq '.commits | length' "$GITHUB_EVENT_PATH"
          echo "=== First commit keys ==="
          jq '.commits[0] | keys' "$GITHUB_EVENT_PATH"
          echo "=== First commit added/modified/removed ==="
          jq '{added: .commits[0].added, modified: .commits[0].modified, removed: .commits[0].removed}' "$GITHUB_EVENT_PATH"

      - name: Generate changelog entries
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          mkdir -p "vault/Claude/Changelog/${REPO_NAME}"

          jq -c '.commits[]' "$GITHUB_EVENT_PATH" | while read -r commit; do
            SHA=$(echo "$commit" | jq -r '.id' | cut -c1-8)
            MESSAGE=$(echo "$commit" | jq -r '.message' | head -1)
            FULL_MESSAGE=$(echo "$commit" | jq -r '.message')
            TIMESTAMP=$(echo "$commit" | jq -r '.timestamp')
            AUTHOR=$(echo "$commit" | jq -r '.author.username // .author.name')
            DATE=$(echo "$TIMESTAMP" | cut -c1-10)
            TIME=$(echo "$TIMESTAMP" | cut -c12-19)

            FILEPATH="vault/Claude/Changelog/${REPO_NAME}/${DATE}-${SHA}.md"

            if [ -f "$FILEPATH" ]; then
              echo "Skip existing: ${FILEPATH}"
              continue
            fi

            {
              echo "---"
              echo "date: ${TIMESTAMP}"
              echo "repo: ${REPO_NAME}"
              echo "author: ${AUTHOR}"
              echo "sha: ${SHA}"
              echo "branch: main"
              echo "tags: [changelog, ${REPO_NAME}, ${AUTHOR}]"
              echo "---"
              echo ""
              echo "## ${SHA} — ${MESSAGE}"
              echo ""
              echo "**Автор:** [[${AUTHOR}]]"
              echo "**Ветка:** main"
              echo "**Дата:** ${DATE} ${TIME} UTC"
              echo ""
              echo "### Сообщение коммита"
              echo "${FULL_MESSAGE}"
              echo ""
              echo "### Изменённые файлы"

              echo "$commit" | jq -r '
                (.added[]? | "- `\(.)` (A)"),
                (.modified[]? | "- `\(.)` (M)"),
                (.removed[]? | "- `\(.)` (D)")
              '
            } > "$FILEPATH"

            echo "Created: ${FILEPATH}"
          done

      - name: Push to vault
        run: |
          cd vault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Claude/Changelog/
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
          else
            REPO_NAME="${{ github.event.repository.name }}"
            git commit -m "changelog(${REPO_NAME}): $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
