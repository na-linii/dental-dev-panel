name: Deploy Dental Hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend-hub
        run: |
          cd frontend-hub
          npm ci
          npm run build

      - name: Build frontend-admin
        run: |
          cd frontend-admin
          npm ci
          npm run build

      - name: Deploy repo to server
        uses: appleboy/ssh-action@v1
        with:
          host: 158.160.85.19
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/dental-hub
            git fetch origin main
            git reset --hard FETCH_HEAD

      - name: Copy frontend-hub build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 158.160.85.19
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend-hub/dist/"
          target: "/opt/dental-hub/"
          overwrite: true

      - name: Copy frontend-admin build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 158.160.85.19
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend-admin/dist/"
          target: "/opt/dental-hub/"
          overwrite: true

      - name: Rebuild and restart
        uses: appleboy/ssh-action@v1
        with:
          host: 158.160.85.19
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/dental-hub
            docker compose build hub-api
            docker compose up -d hub-api nginx
            sleep 5
            curl -sf http://localhost:8880/ > /dev/null && echo "Hub healthy" || echo "Hub unhealthy"

  # === Notify dental-core to run voice eval on prompt changes ===
  # Filter by paths: prompts/voice/{prod,dev}/** → dispatches separate event types.
  # Receiver: dental-core/.github/workflows/eval-voice-smoke.yml (repository_dispatch).
  # Requires secret DENTAL_CORE_DISPATCH_PAT (fine-grained PAT, Actions:write on na-linii/dental-core).
  notify-voice-eval:
    name: Notify voice eval (cross-repo)
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            voice_prod:
              - 'prompts/voice/prod/**'
            voice_dev:
              - 'prompts/voice/dev/**'

      - name: Wait for Langfuse sync to settle (~30s)
        if: steps.filter.outputs.voice_prod == 'true' || steps.filter.outputs.voice_dev == 'true'
        run: sleep 30

      - name: Dispatch — voice prod prompts changed
        if: steps.filter.outputs.voice_prod == 'true'
        env:
          PAT: ${{ secrets.DENTAL_CORE_DISPATCH_PAT }}
        run: |
          curl -sS -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            https://api.github.com/repos/na-linii/dental-core/dispatches \
            -d '{"event_type":"voice-prompts-prod-changed","client_payload":{"sha":"${{ github.sha }}","label":"voice"}}'
          echo "Dispatched voice-prompts-prod-changed (sha=${{ github.sha }})"

      - name: Dispatch — voice dev prompts changed
        if: steps.filter.outputs.voice_dev == 'true'
        env:
          PAT: ${{ secrets.DENTAL_CORE_DISPATCH_PAT }}
        run: |
          curl -sS -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            https://api.github.com/repos/na-linii/dental-core/dispatches \
            -d '{"event_type":"voice-prompts-dev-changed","client_payload":{"sha":"${{ github.sha }}","label":"voice_dev"}}'
          echo "Dispatched voice-prompts-dev-changed (sha=${{ github.sha }})"
