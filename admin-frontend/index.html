<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Mulish', -apple-system, system-ui, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* Login page */
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow: hidden;
  }

  /* Ambient glow */
  .glow-1, .glow-2 {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
  }
  .glow-1 {
    width: 400px; height: 400px;
    background: #51ff97;
    top: -100px; right: -100px;
    animation: glow 6s ease-in-out infinite;
  }
  .glow-2 {
    width: 300px; height: 300px;
    background: #7dd3fc;
    bottom: -50px; left: -50px;
    animation: glow 6s ease-in-out 3s infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.25; }
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    animation: enter 0.5s ease-out;
  }
  @keyframes enter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card-inner {
    background: rgba(18, 20, 41, 0.85);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 1.25rem;
    padding: 2.5rem 2rem;
  }

  /* Logo */
  .logo-section {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #51ff97, #7dd3fc);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 0.75rem;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .logo-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: white;
    letter-spacing: -0.02em;
  }
  .logo-subtitle {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 0.25rem;
  }

  /* Form */
  .form-group {
    margin-bottom: 0.875rem;
    position: relative;
  }
  .form-icon {
    position: absolute;
    left: 0.875rem;
    top: 50%;
    transform: translateY(-50%);
    color: #475569;
    font-size: 0.875rem;
    pointer-events: none;
  }
  .form-input {
    width: 100%;
    padding: 0.625rem 0.875rem 0.625rem 2.5rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 0.75rem;
    color: white;
    font-size: 0.8125rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input::placeholder { color: #475569; }
  .form-input:focus {
    border-color: rgba(81, 255, 151, 0.4);
    background: rgba(255, 255, 255, 0.05);
  }

  /* Error */
  .error-box {
    display: none;
    padding: 0.5rem 0.75rem;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 0.5rem;
    color: #f87171;
    font-size: 0.75rem;
    margin-bottom: 0.875rem;
    align-items: center;
    gap: 0.375rem;
  }
  .error-box.visible { display: flex; }

  /* Button */
  .submit-btn {
    width: 100%;
    padding: 0.625rem;
    background: #51ff97;
    color: #121429;
    border: none;
    border-radius: 0.75rem;
    font-size: 0.8125rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .submit-btn:hover {
    background: #66ffaa;
    box-shadow: 0 0 24px rgba(81, 255, 151, 0.3);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: default;
    box-shadow: none;
  }
  .submit-btn .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: #121429;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.65rem;
    color: #475569;
  }

  /* Dashboard stub */
  .dashboard-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  .dashboard-page .check {
    width: 64px; height: 64px;
    background: rgba(81, 255, 151, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
    animation: enter 0.5s ease-out;
  }
  .dashboard-page h1 {
    color: white;
    font-size: 1.125rem;
    font-weight: 600;
  }
  .dashboard-page .user-info {
    color: #64748b;
    font-size: 0.8125rem;
  }
  .dashboard-page .role-badge {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    background: rgba(81, 255, 151, 0.1);
    color: #51ff97;
    border-radius: 999px;
    font-size: 0.6875rem;
    font-weight: 600;
    margin-left: 0.375rem;
  }
  .logout-btn {
    margin-top: 0.5rem;
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #64748b;
    padding: 0.375rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.75rem;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .logout-btn:hover { color: white; border-color: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  var token = localStorage.getItem('admin_token');
  var user = null;
  try { user = JSON.parse(localStorage.getItem('admin_user')); } catch(e) {}

  function render() {
    var app = document.getElementById('app');
    if (token && user) {
      app.innerHTML =
        '<div class="dashboard-page">' +
          '<div class="check">&#x2713;</div>' +
          '<h1>\u0412\u044B \u0432\u043E\u0448\u043B\u0438</h1>' +
          '<div class="user-info">' +
            (user.full_name || user.username) +
            '<span class="role-badge">' + user.role + '</span>' +
          '</div>' +
          '<button class="logout-btn" onclick="doLogout()">\u0412\u044B\u0439\u0442\u0438</button>' +
        '</div>';
    } else {
      app.innerHTML =
        '<div class="login-page">' +
          '<div class="glow-1"></div>' +
          '<div class="glow-2"></div>' +
          '<div class="login-card">' +
            '<div class="login-card-inner">' +
              '<div class="logo-section">' +
                '<div class="logo-icon">&#x1F9B7;</div>' +
                '<div class="logo-title">\u041D\u0430\u041B\u0438\u043D\u0438\u0438</div>' +
                '<div class="logo-subtitle">\u041F\u0430\u043D\u0435\u043B\u044C \u0443\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u044F \u043A\u043B\u0438\u043D\u0438\u043A\u043E\u0439</div>' +
              '</div>' +
              '<div class="form-group">' +
                '<span class="form-icon">&#x1F464;</span>' +
                '<input id="username" class="form-input" placeholder="\u041B\u043E\u0433\u0438\u043D" autocomplete="username" />' +
              '</div>' +
              '<div class="form-group">' +
                '<span class="form-icon">&#x1F512;</span>' +
                '<input id="password" class="form-input" type="password" placeholder="\u041F\u0430\u0440\u043E\u043B\u044C" autocomplete="current-password" />' +
              '</div>' +
              '<div class="error-box" id="error"><span>&#x26A0;</span> <span id="error-text"></span></div>' +
              '<button class="submit-btn" id="loginBtn" onclick="doLogin()">\u0412\u043E\u0439\u0442\u0438</button>' +
              '<div class="footer">&copy; \u041D\u0430\u041B\u0438\u043D\u0438\u0438 &middot; Dental AI Platform</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      // Enter key to submit
      var pwInput = document.getElementById('password');
      if (pwInput) {
        pwInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') doLogin();
        });
      }
    }
  }

  window.doLogin = async function() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var errBox = document.getElementById('error');
    var errText = document.getElementById('error-text');
    var btn = document.getElementById('loginBtn');

    if (!username || !password) {
      errBox.className = 'error-box visible';
      errText.textContent = '\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043B\u043E\u0433\u0438\u043D \u0438 \u043F\u0430\u0440\u043E\u043B\u044C';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>\u041F\u0440\u043E\u0432\u0435\u0440\u044F\u044E...';
    errBox.className = 'error-box';

    try {
      var r = await fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });
      if (!r.ok) {
        var d = await r.json();
        throw new Error(d.detail || '\u041D\u0435\u0432\u0435\u0440\u043D\u044B\u0439 \u043B\u043E\u0433\u0438\u043D \u0438\u043B\u0438 \u043F\u0430\u0440\u043E\u043B\u044C');
      }
      var data = await r.json();
      token = data.token;
      user = data.user;
      localStorage.setItem('admin_token', token);
      localStorage.setItem('admin_user', JSON.stringify(user));
      render();
    } catch(e) {
      errBox.className = 'error-box visible';
      errText.textContent = e.message;
      btn.disabled = false;
      btn.innerHTML = '\u0412\u043E\u0439\u0442\u0438';
    }
  };

  window.doLogout = function() {
    token = null; user = null;
    localStorage.removeItem('admin_token');
    localStorage.removeItem('admin_user');
    render();
  };

  // Verify token on load
  if (token) {
    fetch('/admin/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function(u) { user = u; localStorage.setItem('admin_user', JSON.stringify(u)); render(); })
      .catch(function() { token = null; user = null; localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); render(); });
  } else {
    render();
  }
})();
</script>
</body>
</html>
