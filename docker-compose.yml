# Dental Hub — Langfuse + Hub API + ngrok
services:

  # === Nginx reverse proxy ===
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-hub/dist:/usr/share/nginx/html/hub:ro
      - ./frontend-admin/dist:/usr/share/nginx/html/app:ro
    depends_on:
      - hub-api
      - langfuse-web
    restart: unless-stopped

  # === Hub API ===
  hub-api:
    build:
      context: .
      dockerfile: hub/Dockerfile
    environment:
      HUB_DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      HUB_SERVICE_SECRET: ${HUB_SERVICE_SECRET}
      LANGFUSE_EXTERNAL_URL: ${LANGFUSE_EXTERNAL_URL:-http://localhost/langfuse}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse-web:3000
      JIRA_USER_EMAIL: ${JIRA_USER_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    depends_on:
      langfuse-web:
        condition: service_started
      langfuse-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s

  # === Langfuse (shared for all clinics) ===
  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-redis:
        condition: service_started
      langfuse-minio:
        condition: service_started
    environment: &langfuse-env
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?Set LANGFUSE_NEXTAUTH_SECRET in .env}
      SALT: ${LANGFUSE_SALT:?Set LANGFUSE_SALT in .env}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Set LANGFUSE_ENCRYPTION_KEY in .env}
      NEXTAUTH_URL: ${LANGFUSE_EXTERNAL_URL:-http://localhost/langfuse}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse-ch-pass
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ""
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-minio-pass
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-redis:
        condition: service_started
    environment:
      <<: *langfuse-env

  langfuse-postgres:
    image: postgres:17
    volumes: [langfuse_postgres_data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/langfuse.xml:ro
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse-ch-pass
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  langfuse-redis:
    image: redis:7-alpine

  langfuse-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes: [langfuse_minio_data:/data]
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse-minio-pass

  langfuse-minio-init:
    image: minio/mc
    depends_on: [langfuse-minio]
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set minio http://langfuse-minio:9000 langfuse langfuse-minio-pass;
      mc mb minio/langfuse --ignore-existing;
      echo 'Bucket created';
      "

  # === Ngrok tunnel (Langfuse accessible from remote clinics) ===
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http nginx:80 --domain=axiomatic-aryana-hillocky.ngrok-free.dev --log stdout
    ports: ["4040:4040"]  # ngrok dashboard
    depends_on:
      nginx:
        condition: service_started

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_minio_data:
