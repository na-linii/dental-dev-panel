server {
    listen 80;
    client_max_body_size 10m;

    # Hub API + frontend (default)
    location / {
        proxy_pass http://hub-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Langfuse UI
    location /langfuse/ {
        proxy_pass http://langfuse-web:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Langfuse API (used by remote agents via ngrok)
    location /api/public/ {
        proxy_pass http://langfuse-web:3000/api/public/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Langfuse next-auth API (login, session, providers)
    location /api/auth/ {
        proxy_pass http://langfuse-web:3000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Admin API
    location /admin/api/ {
        proxy_pass http://hub-api:8000/admin/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
